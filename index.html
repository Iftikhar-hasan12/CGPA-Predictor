<!DOCTYPE html>
<html>
<!-- Updated index-->

<body>
  <h2>Salary Predictor</h2>
  <input id="exp" placeholder="Years of experience">
  <button onclick="predict()">Predict</button>
  <!-- Version-02    -->
  <script>
    function predict() {
      fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ experience: 5 })
      })
        .then(res => res.json())
        .then(data => alert(data.salary));
    }
  </script>
</body>

</html>
